name: ETL Pipeline CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ✅ Syntax check
    - name: Syntax check
      run: |
        python -m py_compile *.py
        python -m py_compile airflow/dags/*.py || true

    # ✅ Import validation (safe modules only)
    - name: Import validation
      run: |
        python -c "import join_tables_etl"
        python -c "import folder_watcher"
        python -c "import email_sender"

    # ✅ DAG parsing (no execution)
    - name: DAG parse check
      run: |
        python - <<EOF
        import sys
        sys.path.append("airflow/dags")
        import data_pipeline_dag
        print("DAG parsed successfully")
        EOF